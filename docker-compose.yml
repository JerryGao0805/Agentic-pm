services:
  mysql:
    image: mysql:8.4
    container_name: pm-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: pm_db
      MYSQL_USER: pm_user
      MYSQL_PASSWORD: pm_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    container_name: pm-app
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: pm_user
      DB_PASSWORD: pm_password
      DB_NAME: pm_db
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  mysql_data:
